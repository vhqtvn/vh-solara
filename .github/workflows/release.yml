name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI (embedded into the binary)
        # `npm run build` stages the SPA into the gitignored web/dist-build/
        # (NOT pkg/web/dist, which holds the tracked fallback placeholder). The
        # materialize step then copies the staged bundle into pkg/web/dist/ so
        # the subsequent `go build` embeds the real SPA via //go:embed dist.
        # Both MUST run before "Build binaries".
        run: |
          cd web
          npm ci
          npm run build
      - name: Materialize staged SPA into pkg/web/dist
        run: bash web/scripts/materialize.sh

      - name: Download dependencies
        run: go mod download

      - name: Build binaries
        run: |
          mkdir -p dist
          TAG="${GITHUB_REF#refs/tags/}"
          LDFLAGS="-s -w -X github.com/vhqtvn/vh-solara/cmd.Version=${TAG}"
          build() { CGO_ENABLED=0 GOOS=$1 GOARCH=$2 go build -trimpath -ldflags "$LDFLAGS" -o "dist/$3" .; }

          build linux   amd64 vh-solara-linux-amd64
          build linux   arm64 vh-solara-linux-arm64
          build linux   386   vh-solara-linux-386
          build linux   arm   vh-solara-linux-arm
          build windows amd64 vh-solara-windows-amd64.exe
          build windows arm64 vh-solara-windows-arm64.exe
          build windows 386   vh-solara-windows-386.exe
          build darwin  amd64 vh-solara-darwin-amd64
          build darwin  arm64 vh-solara-darwin-arm64

      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            VHSolara ${{ github.ref_name }} — single binary (controller + agent daemon + embedded web UI).
            Assets: vh-solara-{linux,darwin}-{amd64,arm64} + linux-{386,arm} + windows-{amd64,arm64,386}, verified by SHA256SUMS.
