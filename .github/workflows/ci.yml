name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: gofmt
        run: |
          files="$(gofmt -l pkg cmd main.go)"
          if [ -n "$files" ]; then
            echo "These files are not gofmt-clean:"; echo "$files"
            echo "Run: gofmt -w pkg cmd main.go"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: unit tests
        run: npm run test:unit
      - name: build
        run: npm run build
      - name: guard — make web leaves no tracked dist changes
        # `npm run build` must stage into the gitignored web/dist-build/ and NEVER
        # dirty the tracked fallback placeholder pkg/web/dist/placeholder.html. If
        # it does, the Vite outDir / materialize contract has regressed.
        working-directory: .
        run: |
          if ! git diff --exit-code -- pkg/web/dist/placeholder.html; then
            echo "::error::npm run build dirtied the tracked placeholder pkg/web/dist/placeholder.html."
            echo "The SPA build must write to the gitignored staging dir (web/dist-build), not pkg/web/dist."
            git --no-pager diff -- pkg/web/dist/placeholder.html
            exit 1
          fi

  # Fixture-backed Playwright e2e. Needs Go too — the Playwright webServer builds
  # the SPA and runs ./tools/fixtureserver (real aggregator + fake OpenCode).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install deps
        working-directory: web
        run: npm ci
      - name: install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium firefox
      - name: e2e
        working-directory: web
        run: npm run test:e2e
      - name: upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-e2e
          path: tmp/agent-runs/playwright
          retention-days: 14
          if-no-files-found: ignore
