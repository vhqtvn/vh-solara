name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: gofmt
        run: |
          files="$(gofmt -l pkg cmd main.go)"
          if [ -n "$files" ]; then
            echo "These files are not gofmt-clean:"; echo "$files"
            echo "Run: gofmt -w pkg cmd main.go"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: unit tests
        run: npm run test:unit
      - name: build
        run: npm run build
