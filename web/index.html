<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Zoom intentionally disabled for app-like PWA gesture feel (WCAG 1.4.4 tradeoff,
         consciously accepted). iOS Safari ignores user-scalable=no; Android Chrome honors it.
         Do not change without explicit product review. -->
    <meta
      name="viewport"
      content="width=device-width, viewport-fit=cover, interactive-widget=resizes-content, initial-scale=1.00, minimum-scale=1.00, maximum-scale=1.00, user-scalable=no"
    />
    <title>VHSolara</title>
    <!-- PWA: installable + auto-updating (see public/sw.js). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <!-- iOS ignores SVG apple-touch-icons; ship the 192px PNG raster so the
         home-screen icon renders on iOS instead of falling back to a screenshot. -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VHSolara" />
    <!-- Chroma theme for server-rendered code blocks (served by the daemon). -->
    <link rel="stylesheet" href="/vh/highlight.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
